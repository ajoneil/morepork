name: Generate Traces

on:
  workflow_run:
    workflows: [Build]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      suite:
        description: "Test suite"
        default: "all"
        type: choice
        options: [all, gbmicrotest, blargg, mooneye, gambatte-tests, mealybug-tearoom, dmg-acid2, age, mooneye-wilbertpol, samesuite, scribbltests, bully, mbc3-tester, strikethrough, turtle-tests, cgb-acid2, cgb-acid-hell, rtc3test]
      emulator:
        description: "Emulator"
        default: "all"
        type: choice
        options: [all, gambatte, sameboy, missingno, docboy]
      system:
        description: "System (DMG / CGB are separate systems)"
        default: "all"
        type: choice
        options: [all, dmg, cgb]

concurrency:
  group: traces
  cancel-in-progress: true

jobs:
  matrix-setup:
    # Skip if triggered by a failed build
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        run: |
          # Jobs are sharded per (suite × emulator × system). DMG and CGB are
          # modelled as separate but related systems, so each runs in its own
          # job. The per-suite system map mirrors the gen-rules SUITES policy —
          # keep them in sync.
          declare -A SYS=(
            [gbmicrotest]="dmg" [mooneye]="dmg" [scribbltests]="dmg" [bully]="dmg"
            [mbc3-tester]="dmg" [strikethrough]="dmg" [turtle-tests]="dmg"
            [gambatte-tests]="dmg cgb" [blargg]="dmg cgb" [mealybug-tearoom]="dmg cgb"
            [dmg-acid2]="dmg cgb" [age]="dmg cgb" [mooneye-wilbertpol]="dmg cgb"
            [samesuite]="dmg cgb"
            [cgb-acid2]="cgb" [cgb-acid-hell]="cgb" [rtc3test]="cgb"
          )
          EMUS="gambatte sameboy missingno docboy"
          SF="${{ inputs.suite }}"; EF="${{ inputs.emulator }}"; YF="${{ inputs.system }}"
          inc=""
          for suite in "${!SYS[@]}"; do
            { [ -z "$SF" ] || [ "$SF" = all ] || [ "$SF" = "$suite" ]; } || continue
            for sysv in ${SYS[$suite]}; do
              { [ -z "$YF" ] || [ "$YF" = all ] || [ "$YF" = "$sysv" ]; } || continue
              for emu in $EMUS; do
                { [ -z "$EF" ] || [ "$EF" = all ] || [ "$EF" = "$emu" ]; } || continue
                inc="${inc}{\"suite\":\"$suite\",\"emulator\":\"$emu\",\"system\":\"$sysv\"},"
              done
            done
          done
          echo "matrix={\"include\":[${inc%,}]}" >> "$GITHUB_OUTPUT"

  trace:
    needs: matrix-setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix-setup.outputs.matrix) }}
    env:
      # DigitalOcean Spaces (S3-compatible) hosts the trace blobs — the full
      # set far exceeds the 1 GB GitHub Pages limit. Set these repo
      # secrets/vars to enable the upload (see AGENTS.md).
      SPACES_KEY: ${{ secrets.SPACES_KEY }}
      SPACES_BUCKET: ${{ vars.SPACES_BUCKET }}
      SPACES_REGION: ${{ vars.SPACES_REGION }}
    steps:
      - uses: actions/checkout@v6

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pil
          # AWS CLI v2 is pre-installed on GitHub-hosted runners (used for the
          # Spaces upload); apt no longer ships an `awscli` package on 24.04.
          aws --version

      # Download CLI from latest build
      - name: Download CLI
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build.yml
          name: gbtrace-bin
          path: target/release
          branch: main

      - name: Make CLI executable
        run: chmod +x target/release/gbtrace

      # Download adapter from latest build (docboy ships a second CGB binary)
      - name: Download adapter
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build.yml
          name: adapter-${{ matrix.emulator }}
          path: adapters/${{ matrix.emulator }}
          branch: main

      - name: Make adapter(s) executable
        run: |
          chmod +x "adapters/${{ matrix.emulator }}/gbtrace-${{ matrix.emulator }}" || true
          chmod +x "adapters/${{ matrix.emulator }}/gbtrace-${{ matrix.emulator }}-cgb" 2>/dev/null || true

      # Generate this (suite × emulator × system) shard. The make target +
      # gen-rules encode the model policy, gambatte hex/blank/audio checks, the
      # model-aware screenshot references, and docboy-cgb binary selection.
      - name: Generate traces
        run: make pix-refs traces-${{ matrix.suite }} EMUS=${{ matrix.emulator }} SYSTEMS=${{ matrix.system }} -j"$(nproc)"
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/adapters/sameboy/SameBoy/build/lib
          CLI: ${{ github.workspace }}/target/release/gbtrace
        timeout-minutes: 320

      # Upload the trace blobs to DigitalOcean Spaces (s3://bucket/tests/<suite>/...).
      - name: Upload trace blobs to Spaces
        if: env.SPACES_KEY != ''
        run: |
          aws s3 sync "build/traces" "s3://${SPACES_BUCKET}/tests" \
            --endpoint-url "https://${SPACES_REGION}.digitaloceanspaces.com" \
            --exclude '*' --include '*.gbtrace' --acl public-read --no-progress
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET }}

      # The deploy job rebuilds manifests from filenames alone (pass/fail is
      # encoded in the name), so we only ship the list, not the blobs.
      - name: Collect trace filenames
        run: |
          mkdir -p _tracelists
          find build/traces -name '*.gbtrace' -printf '%P\n' | sort \
            > "_tracelists/${{ matrix.suite }}-${{ matrix.emulator }}-${{ matrix.system }}.txt"

      - name: Upload trace list
        uses: actions/upload-artifact@v6
        with:
          name: tracelist-${{ matrix.suite }}-${{ matrix.emulator }}-${{ matrix.system }}
          path: _tracelists/${{ matrix.suite }}-${{ matrix.emulator }}-${{ matrix.system }}.txt
          retention-days: 90
