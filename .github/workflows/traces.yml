name: Generate Traces

on:
  # Trace generation is expensive (~20 GB), so it does NOT run automatically
  # on push — trigger it manually when you want to refresh the trace set.
  workflow_dispatch:
    inputs:
      suite:
        description: "Test suite"
        default: "all"
        type: choice
        options: [all, gbmicrotest, blargg, mooneye, gambatte-tests, mealybug-tearoom, dmg-acid2, age, mooneye-wilbertpol, samesuite, scribbltests, bully, mbc3-tester, strikethrough, turtle-tests, cgb-acid2, cgb-acid-hell]
      emulator:
        description: "Emulator"
        default: "all"
        type: choice
        options: [all, gambatte, sameboy, missingno, docboy]
      system:
        description: "System (DMG / CGB are separate systems)"
        default: "all"
        type: choice
        options: [all, dmg, cgb]

concurrency:
  group: traces
  cancel-in-progress: true

jobs:
  matrix-setup:
    # Skip if triggered by a failed build
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        run: |
          # Jobs are sharded per (suite × emulator × system). DMG and CGB are
          # modelled as separate but related systems, so each runs in its own
          # job. The per-suite system map mirrors the gen-rules SUITES policy —
          # keep them in sync.
          declare -A SYS=(
            [gbmicrotest]="dmg" [scribbltests]="dmg" [bully]="dmg"
            [mbc3-tester]="dmg" [strikethrough]="dmg" [turtle-tests]="dmg"
            [mooneye]="dmg cgb"
            [gambatte-tests]="dmg cgb" [blargg]="dmg cgb" [mealybug-tearoom]="dmg cgb"
            [dmg-acid2]="dmg cgb" [age]="dmg cgb" [mooneye-wilbertpol]="dmg cgb"
            [samesuite]="dmg cgb"
            [cgb-acid2]="cgb" [cgb-acid-hell]="cgb"
          )
          EMUS="gambatte sameboy missingno docboy"
          SF="${{ inputs.suite }}"; EF="${{ inputs.emulator }}"; YF="${{ inputs.system }}"
          inc=""
          for suite in "${!SYS[@]}"; do
            { [ -z "$SF" ] || [ "$SF" = all ] || [ "$SF" = "$suite" ]; } || continue
            for sysv in ${SYS[$suite]}; do
              { [ -z "$YF" ] || [ "$YF" = all ] || [ "$YF" = "$sysv" ]; } || continue
              for emu in $EMUS; do
                { [ -z "$EF" ] || [ "$EF" = all ] || [ "$EF" = "$emu" ]; } || continue
                inc="${inc}{\"suite\":\"$suite\",\"emulator\":\"$emu\",\"system\":\"$sysv\"},"
              done
            done
          done
          echo "matrix={\"include\":[${inc%,}]}" >> "$GITHUB_OUTPUT"

  trace:
    needs: matrix-setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix-setup.outputs.matrix) }}
    env:
      # DigitalOcean Spaces (S3-compatible) hosts the trace blobs — the full
      # set far exceeds the 1 GB GitHub Pages limit. Set these repo
      # secrets/vars to enable the upload (see AGENTS.md).
      SPACES_KEY: ${{ secrets.SPACES_KEY }}
      SPACES_BUCKET: ${{ vars.SPACES_BUCKET }}
      SPACES_REGION: ${{ vars.SPACES_REGION }}
    steps:
      - uses: actions/checkout@v6

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pil
          # AWS CLI v2 is pre-installed on GitHub-hosted runners (used for the
          # Spaces upload); apt no longer ships an `awscli` package on 24.04.
          aws --version

      # Download CLI from latest build
      - name: Download CLI
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build.yml
          name: morepork-bin
          path: target/release
          branch: main

      - name: Make CLI executable
        # `touch` is essential: the unzipped artifact keeps its original build
        # mtime, which is older than the just-checked-out source. The `$(CLI)`
        # make target lists crates/morepork/src as prerequisites, so without this
        # make would rebuild the CLI from scratch (~2 min) on every trace job.
        run: |
          chmod +x target/release/morepork
          touch target/release/morepork

      # Download adapter from latest build (docboy ships a second CGB binary)
      - name: Download adapter
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build.yml
          name: adapter-${{ matrix.emulator }}
          path: adapters/${{ matrix.emulator }}
          branch: main

      # Place the downloaded binaries at the paths make expects, then verify.
      # upload-artifact's least-common-ancestor path logic can nest a flat
      # artifact (e.g. adapters/missingno/adapters/missingno/morepork-missingno);
      # relocate any such stray into place so the trace stamps find it. With
      # BUILD_ADAPTERS=0 a genuinely absent binary fails fast here rather than
      # silently recompiling the adapter on every job.
      - name: Locate, arm and verify adapter(s)
        run: |
          emu='${{ matrix.emulator }}'
          dir="adapters/$emu"
          for bin in "morepork-$emu" "morepork-$emu-cgb"; do
            if [ ! -f "$dir/$bin" ]; then
              found="$(find "$dir" -type f -name "$bin" -print -quit 2>/dev/null || true)"
              [ -n "$found" ] && mv "$found" "$dir/$bin"
            fi
            [ -f "$dir/$bin" ] && chmod +x "$dir/$bin"
          done
          need="$dir/morepork-$emu"
          [ "$emu" = docboy ] && [ '${{ matrix.system }}' = cgb ] && need="$dir/morepork-docboy-cgb"
          if [ ! -f "$need" ]; then
            echo "::error::Adapter binary '$need' was not downloaded — is the '$emu' build.yml job green?"
            find "$dir" -type f -name 'morepork-*' || true
            exit 1
          fi

      # Generate this (suite × emulator × system) shard. The make target +
      # gen-rules encode the model policy, gambatte hex/blank/audio checks, the
      # model-aware screenshot references, and docboy-cgb binary selection.
      # BUILD_ADAPTERS=0: the adapter binary is the artifact downloaded above,
      # so trace stamps must use it as-is and never recompile it (a missing
      # artifact should fail fast, not trigger a from-scratch cargo/cmake build).
      - name: Generate traces
        run: make pix-refs traces-${{ matrix.suite }} EMUS=${{ matrix.emulator }} SYSTEMS=${{ matrix.system }} BUILD_ADAPTERS=0 -j"$(nproc)"
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/adapters/sameboy/SameBoy/build/lib
          CLI: ${{ github.workspace }}/target/release/morepork
        timeout-minutes: 320

      # Upload the trace blobs to DigitalOcean Spaces (s3://bucket/tests/<suite>/...).
      - name: Upload trace blobs to Spaces
        if: env.SPACES_KEY != ''
        run: |
          aws s3 sync "build/traces" "s3://${SPACES_BUCKET}/tests" \
            --endpoint-url "https://${SPACES_REGION}.digitaloceanspaces.com" \
            --exclude '*' --include '*.morepork' --acl public-read --no-progress
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET }}

      # The deploy job rebuilds manifests from filenames alone (pass/fail is
      # encoded in the name), so we only ship the list, not the blobs.
      - name: Collect trace filenames
        run: |
          mkdir -p _tracelists
          find build/traces -name '*.morepork' -printf '%P\n' | sort \
            > "_tracelists/${{ matrix.suite }}-${{ matrix.emulator }}-${{ matrix.system }}.txt"

      - name: Upload trace list
        uses: actions/upload-artifact@v6
        with:
          name: tracelist-${{ matrix.suite }}-${{ matrix.emulator }}-${{ matrix.system }}
          path: _tracelists/${{ matrix.suite }}-${{ matrix.emulator }}-${{ matrix.system }}.txt
          retention-days: 90
