name: Generate Traces

on:
  workflow_run:
    workflows: [Build]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      suite:
        description: "Test suite"
        default: "all"
        type: choice
        options: [all, gbmicrotest, blargg, mooneye, gambatte-tests, mealybug-tearoom, dmg-acid2, age, mooneye-wilbertpol, samesuite, scribbltests, bully, mbc3-tester, strikethrough, turtle-tests]
      emulator:
        description: "Emulator (all, gambatte, sameboy, gateboy, missingno, docboy)"
        default: "all"
        type: choice
        options: [all, gambatte, sameboy, gateboy, missingno, docboy]

concurrency:
  group: traces
  cancel-in-progress: true

jobs:
  matrix-setup:
    # Skip if triggered by a failed build
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        run: |
          SUITES='["gbmicrotest","blargg","mooneye","gambatte-tests","mealybug-tearoom","dmg-acid2","age","mooneye-wilbertpol","samesuite","scribbltests","bully","mbc3-tester","strikethrough","turtle-tests"]'
          EMUS='["gambatte","sameboy","gateboy","missingno","docboy"]'

          if [ "${{ inputs.suite }}" != "" ] && [ "${{ inputs.suite }}" != "all" ]; then
            SUITES='["${{ inputs.suite }}"]'
          fi
          if [ "${{ inputs.emulator }}" != "" ] && [ "${{ inputs.emulator }}" != "all" ]; then
            EMUS='["${{ inputs.emulator }}"]'
          fi

          echo "matrix={\"suite\":${SUITES},\"emulator\":${EMUS}}" >> "$GITHUB_OUTPUT"

  trace:
    needs: matrix-setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix-setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pil

      # Download CLI from latest build
      - name: Download CLI
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build.yml
          name: gbtrace-bin
          path: target/release
          branch: main

      - name: Make CLI executable
        run: chmod +x target/release/gbtrace

      # Download adapter from latest build
      - name: Download adapter
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build.yml
          name: adapter-${{ matrix.emulator }}
          path: adapters/${{ matrix.emulator }}
          branch: main

      - name: Make adapter executable
        run: chmod +x adapters/${{ matrix.emulator }}/gbtrace-${{ matrix.emulator }}

      # Generate pix references if needed
      - name: Generate pix references
        run: make pix-refs

      # Generate traces by running scripts directly (no make, no adapter rebuild)
      - name: Generate traces
        run: |
          SUITE="${{ matrix.suite }}"
          EMU="${{ matrix.emulator }}"
          BIN="adapters/${EMU}/gbtrace-${EMU}"
          TRACE_DIR="build/traces/${SUITE}"
          # ROM_DIR: some suites have a different ROM directory
          if [ "$SUITE" = "gambatte-tests" ]; then
            ROM_DIR="test-suites/gambatte"
          else
            ROM_DIR="test-suites/${SUITE}"
          fi
          mkdir -p "$TRACE_DIR"

          MAX_JOBS=$(nproc)

          # Run a command in the background, limiting parallelism
          run_parallel() {
            while [ "$(jobs -r | wc -l)" -ge "$MAX_JOBS" ]; do wait -n 2>/dev/null || true; done
            "$@" || true &
          }

          case "$SUITE" in
            gbmicrotest)
              PROFILE="test-suites/gbmicrotest/profile.toml"
              while IFS= read -r -d '' rom; do
                run_parallel bash scripts/trace-gbmicrotest.sh "$BIN" "$rom" "$PROFILE" "$TRACE_DIR"
              done < <(find "$ROM_DIR" -name '*.gb' -print0 | sort -z)
              ;;
            blargg)
              PROFILE="test-suites/blargg/profile.toml"
              while IFS= read -r -d '' rom; do
                run_parallel bash scripts/trace-blargg.sh "$BIN" "$rom" "$PROFILE" "$TRACE_DIR" "$ROM_DIR"
              done < <(find "$ROM_DIR" -name '*.gb' -not -path '*/dmg_sound/*' -print0 | sort -z)
              # dmg_sound tests use their own profile (skip gateboy — no APU)
              if [ "$EMU" != "gateboy" ]; then
                DMG_SOUND_PROFILE="test-suites/blargg/dmg_sound/profile.toml"
                while IFS= read -r -d '' rom; do
                  run_parallel bash scripts/trace-dmg-sound.sh "$BIN" "$rom" "$DMG_SOUND_PROFILE" "$TRACE_DIR" "$ROM_DIR"
                done < <(find "test-suites/blargg/dmg_sound" -name '*.gb' -print0 | sort -z)
              fi
              ;;
            mooneye)
              PROFILE="test-suites/mooneye/profile.toml"
              while IFS= read -r -d '' rom; do
                run_parallel bash scripts/trace-mooneye.sh "$BIN" "$rom" "$PROFILE" "$TRACE_DIR" "$ROM_DIR"
              done < <(find "$ROM_DIR" -name '*.gb' -print0 | sort -z)
              ;;
            gambatte-tests)
              PROFILE="test-suites/gambatte/profile.toml"
              # Generate pix references from PNGs
              make pix-refs 2>/dev/null || true
              while IFS= read -r -d '' rom; do
                run_parallel bash scripts/trace-gambatte-tests.sh "$BIN" "$rom" "$PROFILE" "$TRACE_DIR" "$ROM_DIR"
              done < <(find "$ROM_DIR" -name '*.gb' ! -name '*.gbc' -print0 | sort -z)
              ;;
            mealybug-tearoom)
              PROFILE="test-suites/mealybug-tearoom/profile.toml"
              make pix-refs 2>/dev/null || true
              while IFS= read -r -d '' rom; do
                run_parallel bash scripts/trace-mealybug-tearoom.sh "$BIN" "$rom" "$PROFILE" "$TRACE_DIR" "$ROM_DIR"
              done < <(find "$ROM_DIR" -name '*.gb' -print0 | sort -z)
              ;;
            dmg-acid2)
              PROFILE="test-suites/dmg-acid2/profile.toml"
              REF="test-suites/dmg-acid2/reference.pix"
              bash scripts/trace-screenshot.sh "$BIN" \
                "test-suites/dmg-acid2/dmg-acid2.gb" "$PROFILE" "$REF" "$TRACE_DIR" 30 || true
              ;;
            age)
              PROFILE="test-suites/age/profile.toml"
              while IFS= read -r -d '' rom; do
                run_parallel bash scripts/trace-age.sh "$BIN" "$rom" "$PROFILE" "$TRACE_DIR" "$ROM_DIR"
              done < <(find "$ROM_DIR" -name '*.gb' -print0 | sort -z)
              ;;
            mooneye-wilbertpol)
              PROFILE="test-suites/mooneye-wilbertpol/profile.toml"
              while IFS= read -r -d '' rom; do
                run_parallel bash scripts/trace-mooneye-wilbertpol.sh "$BIN" "$rom" "$PROFILE" "$TRACE_DIR" "$ROM_DIR"
              done < <(find "$ROM_DIR" -name '*.gb' -print0 | sort -z)
              ;;
            samesuite)
              PROFILE="test-suites/samesuite/profile.toml"
              while IFS= read -r -d '' rom; do
                run_parallel bash scripts/trace-samesuite.sh "$BIN" "$rom" "$PROFILE" "$TRACE_DIR" "$ROM_DIR"
              done < <(find "$ROM_DIR" -name '*.gb' -print0 | sort -z)
              ;;
            scribbltests)
              PROFILE="test-suites/scribbltests/profile.toml"
              while IFS= read -r -d '' rom; do
                run_parallel bash scripts/trace-screenshot-suite.sh "$BIN" "$rom" "$PROFILE" "$TRACE_DIR" "$ROM_DIR" 300
              done < <(find "$ROM_DIR" -name '*.gb' -print0 | sort -z)
              ;;
            bully)
              PROFILE="test-suites/bully/profile.toml"
              while IFS= read -r -d '' rom; do
                run_parallel bash scripts/trace-screenshot-suite.sh "$BIN" "$rom" "$PROFILE" "$TRACE_DIR" "$ROM_DIR" 30
              done < <(find "$ROM_DIR" -name '*.gb' -print0 | sort -z)
              ;;
            mbc3-tester)
              PROFILE="test-suites/mbc3-tester/profile.toml"
              while IFS= read -r -d '' rom; do
                run_parallel bash scripts/trace-screenshot-suite.sh "$BIN" "$rom" "$PROFILE" "$TRACE_DIR" "$ROM_DIR" 40
              done < <(find "$ROM_DIR" -name '*.gb' -print0 | sort -z)
              ;;
            strikethrough)
              PROFILE="test-suites/strikethrough/profile.toml"
              while IFS= read -r -d '' rom; do
                run_parallel bash scripts/trace-screenshot-suite.sh "$BIN" "$rom" "$PROFILE" "$TRACE_DIR" "$ROM_DIR" 30
              done < <(find "$ROM_DIR" -name '*.gb' -print0 | sort -z)
              ;;
            turtle-tests)
              PROFILE="test-suites/turtle-tests/profile.toml"
              while IFS= read -r -d '' rom; do
                run_parallel bash scripts/trace-screenshot-suite.sh "$BIN" "$rom" "$PROFILE" "$TRACE_DIR" "$ROM_DIR" 30
              done < <(find "$ROM_DIR" -name '*.gb' -print0 | sort -z)
              ;;
          esac

          # Wait for all background jobs, don't fail if some tests failed
          wait 2>/dev/null || true

          python3 scripts/manifest.py "$TRACE_DIR" "$ROM_DIR"
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/adapters/sameboy/SameBoy/build/lib
          CLI: ${{ github.workspace }}/target/release/gbtrace
        timeout-minutes: 120

      - name: Upload traces
        uses: actions/upload-artifact@v6
        with:
          name: traces-${{ matrix.suite }}-${{ matrix.emulator }}
          path: build/traces/${{ matrix.suite }}
          retention-days: 90
