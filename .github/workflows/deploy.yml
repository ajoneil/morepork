name: Deploy Site

on:
  workflow_run:
    workflows: [Generate Traces]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    # Skip if triggered by a failed trace run
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      # Public DigitalOcean Spaces CDN base for trace blobs, e.g.
      # https://<bucket>.<region>.cdn.digitaloceanspaces.com
      TRACE_BASE: ${{ vars.TRACE_BASE }}
    steps:
      - uses: actions/checkout@v6

      - name: Install python
        run: sudo apt-get update && sudo apt-get install -y python3

      - name: Download WASM
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build.yml
          name: wasm-pkg
          path: web/pkg
          branch: main

      # Trace blobs live on DigitalOcean Spaces. We only need the per-(suite,emu)
      # filename lists to rebuild the coverage manifests — pass/fail is encoded
      # in each filename, so no blob content is required here.
      - name: Download trace lists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p _tracelists
          gh api --paginate \
            "repos/${{ github.repository }}/actions/artifacts?per_page=100" \
            --jq '.artifacts[] | select(.expired == false and (.name | startswith("tracelist-"))) | "\(.name) \(.id)"' \
            > /tmp/artifacts.txt
          seen=""
          while read -r name id; do
            [ -n "$name" ] || continue
            case " $seen " in *" $name "*) continue ;; esac   # newest wins (API is reverse-chron)
            seen="$seen $name"
            gh api "repos/${{ github.repository }}/actions/artifacts/${id}/zip" > "/tmp/${name}.zip"
            unzip -qo "/tmp/${name}.zip" -d _tracelists || true
          done < /tmp/artifacts.txt
          echo "Downloaded $(ls _tracelists/*.txt 2>/dev/null | wc -l) trace lists"

      # Recreate build/traces/<suite>/<name>.gbtrace as empty files (manifest.py
      # only reads filenames), then regenerate each suite's manifest.json.
      - name: Rebuild manifests
        run: |
          mkdir -p build/traces
          for f in _tracelists/*.txt; do
            [ -f "$f" ] || continue
            while IFS= read -r rel; do
              [ -n "$rel" ] || continue
              mkdir -p "build/traces/$(dirname "$rel")"
              : > "build/traces/$rel"
            done < "$f"
          done
          declare -A ROM_DIRS
          ROM_DIRS[gambatte-tests]="test-suites/gambatte"
          for suite_dir in build/traces/*/; do
            [ -d "$suite_dir" ] || continue
            suite=$(basename "$suite_dir")
            rom_dir="${ROM_DIRS[$suite]:-test-suites/$suite}"
            [ -d "$rom_dir" ] && python3 scripts/manifest.py "$suite_dir" "$rom_dir"
          done
          echo "Manifest summary:"
          for suite_dir in build/traces/*/; do
            echo "  $(basename "$suite_dir")"
          done

      # Assemble the Pages site: app + per-suite manifest + ROMs + profiles.
      # The .gbtrace blobs are NOT copied here — they're served from Spaces.
      - name: Assemble site
        run: |
          mkdir -p build/site/pkg build/site/tests
          cp web/index.html build/site/
          cp -r web/src build/site/
          cp web/pkg/gbtrace_wasm.js web/pkg/gbtrace_wasm_bg.wasm build/site/pkg/

          # Tell the viewer where the trace blobs live (DigitalOcean Spaces CDN).
          if [ -n "$TRACE_BASE" ]; then
            sed -i "s|<script type=\"importmap\">|<script>window.GBTRACE_TRACE_BASE=\"${TRACE_BASE}\";</script>\n  <script type=\"importmap\">|" build/site/index.html
          fi

          declare -A ROM_DIRS
          ROM_DIRS[gambatte-tests]="test-suites/gambatte"
          for suite_dir in build/traces/*/; do
            [ -d "$suite_dir" ] || continue
            suite=$(basename "$suite_dir")
            dst="$(pwd)/build/site/tests/$suite"
            mkdir -p "$dst"
            [ -f "$suite_dir/manifest.json" ] && cp "$suite_dir/manifest.json" "$dst/"
            rom_dir="${ROM_DIRS[$suite]:-test-suites/$suite}"
            [ -d "$rom_dir" ] || continue
            ( cd "$rom_dir" && find . \( -name '*.gb' -o -name '*.gbc' \) \
                -exec cp --parents {} "$dst/" \; )
            [ -f "$rom_dir/profile.toml" ] && cp "$rom_dir/profile.toml" "$dst/"
          done
          echo "Site assembled (manifests + ROMs; trace blobs served from Spaces)."

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
