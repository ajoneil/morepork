name: Deploy Site

on:
  workflow_run:
    workflows: [Generate Traces]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    # Skip if triggered by a failed trace run
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      # Download WASM from latest build
      - name: Download WASM
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build.yml
          name: wasm-pkg
          path: web/pkg
          branch: main

      # Download the latest trace artifact for each suite-emulator pair,
      # searching across all workflow runs so partial rebuilds don't lose
      # results from older runs.
      - name: Download all trace artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SUITES=(gbmicrotest blargg mooneye gambatte-tests mealybug-tearoom dmg-acid2 age mooneye-wilbertpol samesuite scribbltests bully mbc3-tester strikethrough turtle-tests)
          EMUS=(gambatte sameboy gateboy missingno docboy)

          mkdir -p _trace_artifacts

          # Fetch all non-expired trace artifacts, newest first.
          gh api --paginate \
            "repos/${{ github.repository }}/actions/artifacts?per_page=100" \
            --jq '.artifacts[] | select(.expired == false and (.name | startswith("traces-"))) | {name, id}' \
            > /tmp/all_artifacts.json

          for suite in "${SUITES[@]}"; do
            for emu in "${EMUS[@]}"; do
              name="traces-${suite}-${emu}"
              # First match is the newest since the API returns reverse-chronological
              artifact_id=$(jq -r "select(.name == \"${name}\") | .id" /tmp/all_artifacts.json | head -1)
              if [ -z "$artifact_id" ]; then
                echo "Warning: no artifact found for ${name}"
                continue
              fi
              echo "Downloading ${name} (artifact ${artifact_id})"
              gh api "repos/${{ github.repository }}/actions/artifacts/${artifact_id}/zip" \
                > "/tmp/${name}.zip"
              mkdir -p "_trace_artifacts/${name}"
              unzip -qo "/tmp/${name}.zip" -d "_trace_artifacts/${name}"
              rm "/tmp/${name}.zip"
            done
          done

      # Merge trace artifacts into build/traces/
      # Artifacts are in _trace_artifacts/traces-{suite}-{emulator}/...
      # We need to merge them by suite into build/traces/{suite}/
      - name: Merge traces
        run: |
          mkdir -p build/traces
          for dir in _trace_artifacts/traces-*/; do
            [ -d "$dir" ] || continue
            # Extract suite name: traces-{suite}-{emulator} -> {suite}
            basename=$(basename "$dir")
            suite=$(echo "$basename" | sed 's/^traces-//; s/-[^-]*$//')
            mkdir -p "build/traces/$suite"
            cp -rn "$dir"* "build/traces/$suite/" 2>/dev/null || true
          done
          # Regenerate manifests with merged data
          # Map suite trace dirs to ROM dirs (some differ)
          declare -A ROM_DIRS
          ROM_DIRS[gambatte-tests]="test-suites/gambatte"

          for suite_dir in build/traces/*/; do
            [ -d "$suite_dir" ] || continue
            suite=$(basename "$suite_dir")
            rom_dir="${ROM_DIRS[$suite]:-test-suites/$suite}"
            if [ -d "$rom_dir" ]; then
              python3 scripts/manifest.py "$suite_dir" "$rom_dir"
            fi
          done
          echo "Trace summary:"
          for suite_dir in build/traces/*/; do
            count=$(find "$suite_dir" -name '*.gbtrace' 2>/dev/null | wc -l)
            echo "  $(basename "$suite_dir"): $count traces"
          done

      # Assemble site
      - name: Assemble site
        run: |
          mkdir -p build/site/pkg build/site/tests
          cp web/index.html build/site/
          cp -r web/src build/site/
          cp web/pkg/gbtrace_wasm.js web/pkg/gbtrace_wasm_bg.wasm build/site/pkg/

          # Copy traces
          for suite_dir in build/traces/*/; do
            [ -d "$suite_dir" ] || continue
            suite=$(basename "$suite_dir")
            cp -r "$suite_dir" "build/site/tests/$suite"
          done

          # Copy ROMs and profiles — use ROM_DIRS mapping for suites with different paths
          declare -A ROM_DIRS
          ROM_DIRS[gambatte-tests]="test-suites/gambatte"

          for suite_dir in build/site/tests/*/; do
            [ -d "$suite_dir" ] || continue
            suite=$(basename "$suite_dir")
            rom_dir="${ROM_DIRS[$suite]:-test-suites/$suite}"
            [ -d "$rom_dir" ] || continue
            # Copy ROMs
            cd "$rom_dir"
            find . -name '*.gb' -exec sh -c 'mkdir -p "../../build/site/tests/'"$suite"'/$(dirname "{}")" && cp "{}" "../../build/site/tests/'"$suite"'/{}"' \;
            cd ../..
            # Copy profile
            if [ -f "$rom_dir/profile.toml" ]; then
              cp "$rom_dir/profile.toml" "$suite_dir/"
            fi
          done

          echo "Site assembled in build/site/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
