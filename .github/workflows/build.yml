name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build
  cancel-in-progress: true

jobs:
  cli-and-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build CLI
        run: make cli

      - name: Build FFI library
        run: make ffi

      - name: Build WASM
        run: make wasm

      - name: Upload CLI
        uses: actions/upload-artifact@v6
        with:
          name: gbtrace-bin
          path: target/release/gbtrace
          retention-days: 90

      - name: Upload FFI library
        uses: actions/upload-artifact@v6
        with:
          name: gbtrace-ffi
          path: |
            target/release/libgbtrace_ffi.a
            crates/gbtrace-ffi/gbtrace.h
          retention-days: 90

      - name: Upload WASM
        uses: actions/upload-artifact@v6
        with:
          name: wasm-pkg
          path: |
            web/pkg/gbtrace_wasm.js
            web/pkg/gbtrace_wasm_bg.wasm
          retention-days: 90

  adapter:
    needs: cli-and-wasm
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emulator: [gambatte, sameboy, missingno, docboy]
    steps:
      - uses: actions/checkout@v6

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake scons zlib1g-dev

      # Download FFI library built by cli-and-wasm job
      - name: Download FFI library
        uses: actions/download-artifact@v4
        with:
          name: gbtrace-ffi
          path: _ffi

      - name: Install FFI library
        run: |
          mkdir -p target/release
          cp _ffi/target/release/libgbtrace_ffi.a target/release/ 2>/dev/null || \
            cp _ffi/libgbtrace_ffi.a target/release/
          cp _ffi/crates/gbtrace-ffi/gbtrace.h crates/gbtrace-ffi/ 2>/dev/null || \
            cp _ffi/gbtrace.h crates/gbtrace-ffi/
          ls -la target/release/libgbtrace_ffi.a crates/gbtrace-ffi/gbtrace.h

      # Cache upstream repos only (the expensive clones), not the built binary
      - name: Cache upstream repos
        uses: actions/cache@v5
        with:
          path: |
            adapters/${{ matrix.emulator }}/gambatte-speedrun
            adapters/${{ matrix.emulator }}/SameBoy
            adapters/${{ matrix.emulator }}/mgba
            adapters/${{ matrix.emulator }}/metroboy
            adapters/${{ matrix.emulator }}/metrolib
            adapters/${{ matrix.emulator }}/docboy
          key: upstream-${{ matrix.emulator }}-v1

      - name: Clone and build gambatte
        if: matrix.emulator == 'gambatte'
        run: |
          cd adapters/gambatte
          [ -d gambatte-speedrun ] || git clone --recursive --depth 1 \
            https://github.com/pokemon-speedrunning/gambatte-speedrun.git
          make -j$(nproc)

      - name: Clone and build sameboy
        if: matrix.emulator == 'sameboy'
        run: |
          cd adapters/sameboy
          [ -d SameBoy ] || git clone --depth 1 https://github.com/LIJI32/SameBoy.git
          # `make lib` applies sameboy-tcycle.patch (idempotently, via a stamp
          # file inside SameBoy/) then builds the libs. Run it unconditionally so
          # a cached, pre-patch SameBoy still gets patched + rebuilt.
          make lib -j$(nproc)
          make -j$(nproc)

      - name: Clone and build mgba
        if: matrix.emulator == 'mgba'
        run: |
          cd adapters/mgba
          if [ ! -d mgba ]; then
            git clone --depth 1 https://github.com/mgba-emu/mgba.git
            cd mgba && mkdir build && cd build && \
            cmake .. -DLIBMGBA_ONLY=ON -DBUILD_STATIC=ON \
              -DCMAKE_BUILD_TYPE=Release -DENABLE_DEBUGGERS=ON && \
            make -j$(nproc)
            cd ../..
          fi
          make -j$(nproc)

      - name: Install Rust (missingno)
        if: matrix.emulator == 'missingno'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo (missingno)
        if: matrix.emulator == 'missingno'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: adapters/missingno

      - name: Build missingno
        if: matrix.emulator == 'missingno'
        run: |
          cd adapters/missingno
          # missingno-gb + missingno-gbc come from the same git dep (CGB tracer).
          cargo update -p missingno-gb -p missingno-gbc 2>/dev/null || cargo update
          cargo build --release
          cp target/release/gbtrace-missingno .

      - name: Clone and build docboy
        if: matrix.emulator == 'docboy'
        run: make -C adapters/docboy

      - name: Upload adapter
        uses: actions/upload-artifact@v6
        with:
          name: adapter-${{ matrix.emulator }}
          path: |
            adapters/${{ matrix.emulator }}/gbtrace-${{ matrix.emulator }}
            adapters/${{ matrix.emulator }}/gbtrace-${{ matrix.emulator }}-cgb
            adapters/${{ matrix.emulator }}/SameBoy/build/lib/libsameboy.so
            adapters/${{ matrix.emulator }}/boot_roms/
          if-no-files-found: ignore
          retention-days: 90
